server {
	listen 80;
	listen [::]:80;

	root /var/www/spqr.net/html;
	index index.html index.htm index.nginx-debian.html;

	server_name spqr.net;

	location / {
		# First attempt to serve request as file, then
		# as directory, then fall back to displaying a 404.
		try_files $uri $uri/ =404;
	}
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;

	root /var/www/spqr.net/html;
	index index.html index.htm index.nginx-debian.html;

	server_name spqr.net;

	ssl on;

	ssl_certificate /etc/ssl/certs/spqr.net.crt;
	ssl_certificate_key /etc/ssl/private/spqr.net.key;

	location / {
		# First attempt to serve request as file, then
		# as directory, then fall back to displaying a 404.
		try_files $uri $uri/ =404;
	}
}
