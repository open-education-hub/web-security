services:
    mysql:
        container_name: mysql
        hostname: mysql
        image: mysql:5.7
        environment:
            MYSQL_ROOT_PASSWORD: secure-password
            MYSQL_USER: sss_user
            MYSQL_PASSWORD: secure-password
            MYSQL_DATABASE: db
        networks:
            - db-network
        volumes:
            - ./mysql-init.sql:/docker-entrypoint-initdb.d/mysql-init.sql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecure-password"]
            timeout: 5s
            retries: 5
    php:
        container_name: sss-web-07_high-score
        depends_on:
            mysql:
              condition: service_healthy
        build:
            context: ..
            dockerfile: ./deploy/Dockerfile
        ports:
            - "7001:80"
        networks:
            - db-network

networks:
    db-network:
      driver: bridge
